<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Player Pro | Studio Edition</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com"></script>
    <style>
        @import url('https://fonts.googleapis.com');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg-deep: #09090b;
            --bg-surface: #121214;
            --bg-elevated: #1c1c21;
            --bg-hover: #27272a;
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.3);
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
            --text-muted: #52525b;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: grid;
            grid-template-rows: 64px 1fr 100px; /* Header, Main, Player */
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .logo-text h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-controls {
            display: flex;
            background: var(--bg-deep);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

        .nav-btn.active {
            background: var(--bg-elevated);
            color: var(--accent);
        }

        /* --- MAIN LAYOUT --- */
        .main-view {
            display: grid;
            grid-template-columns: 300px 1fr 280px;
            overflow: hidden;
        }

        .sidebar {
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* --- MIXER & TRACKS --- */
        .mixer-panel {
            padding: 24px;
            overflow-y: auto;
            background: var(--bg-deep);
        }

        .track-strip {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr 120px 80px;
            align-items: center;
            gap: 20px;
        }

        .track-info h3 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .track-info p {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Custom Slider */
        input[type=range] {
            -webkit-appearance: none;
            background: var(--bg-elevated);
            height: 4px;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- PLAYER BAR --- */
        .player-bar {
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 32px;
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .btn-play {
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 50%;
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .time-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            color: var(--accent);
        }

        .status-badge {
            font-size: 10px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-group">
            <div class="logo-box">
                <i data-lucide="layers" size="20"></i>
            </div>
            <div class="logo-text">
                <h1>VS PLAYER PRO</h1>
                <span>Professional Multitrack</span>
            </div>
        </div>

        <nav class="nav-controls">
            <button class="nav-btn active">Mixer</button>
            <button class="nav-btn">Setlist</button>
            <button class="nav-btn">Mapeamento</button>
            <button class="nav-btn">Configurações</button>
        </nav>

        <div class="header-actions">
            <button class="icon-btn"><i data-lucide="search" size="20"></i></button>
            <button class="icon-btn"><i data-lucide="bell" size="20"></i></button>
            <button class="icon-btn"><i data-lucide="user" size="20"></i></button>
        </div>
    </header>

    <main class="main-view">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="section-title">Playlist Atual</span>
                <button class="icon-btn"><i data-lucide="plus-circle" size="18"></i></button>
            </div>
            <!-- Lista de músicas viria aqui -->
        </aside>

        <section class="mixer-panel">
            <div class="track-strip">
                <div class="track-info">
                    <h3>GUITARRAS ELÉTRICAS</h3>
                    <p>Stereo • Ch 1-2</p>
                </div>
                <input type="range" value="80">
                <div style="display: flex; gap: 8px;">
                    <button class="icon-btn"><i data-lucide="mic-off" size="16"></i></button>
                    <button class="icon-btn"><i data-lucide="headphones" size="16"></i></button>
                </div>
            </div>

            <div class="track-strip">
                <div class="track-info">
                    <h3>BACKING VOCALS</h3>
                    <p>Mono • Ch 3</p>
                </div>
                <input type="range" value="65">
                <div style="display: flex; gap: 8px;">
                    <button class="icon-btn"><i data-lucide="mic-off" size="16"></i></button>
                    <button class="icon-btn"><i data-lucide="headphones" size="16"></i></button>
                </div>
            </div>
        </section>

        <aside class="sidebar" style="border-left: 1px solid var(--border); border-right: none;">
            <div class="sidebar-header">
                <span class="section-title">Detalhes da Track</span>
            </div>
        </aside>
    </main>

    <footer class="player-bar">
        <div class="song-playing">
            <p style="font-size: 14px; font-weight: 600;">Ousado Amor</p>
            <p style="font-size: 12px; color: var(--text-muted);">Tom: G | BPM: 72</p>
        </div>

        <div class="playback-controls">
            <button class="icon-btn"><i data-lucide="skip-back" fill="currentColor"></i></button>
            <button class="btn-play"><i data-lucide="play" fill="white"></i></button>
            <button class="icon-btn"><i data-lucide="skip-forward" fill="currentColor"></i></button>
            <div class="time-display">02:45</div>
        </div>

        <div style="display: flex; justify-content: flex-end; align-items: center; gap: 16px;">
            <span class="status-badge">OUT: 1-8</span>
            <button class="icon-btn"><i data-lucide="volume-2" size="20"></i></button>
            <button class="icon-btn"><i data-lucide="maximize" size="20"></i></button>
        </div>
    </footer>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();
    </script>
</body>
</html>
