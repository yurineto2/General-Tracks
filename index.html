<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>General Tracks</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* topo */

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* editor */

#editor{
    padding:20px;
}

textarea{
    width:100%;
    height:200px;
    background:#1a1a1a;
    color:white;
    border:none;
    padding:15px;
    font-size:16px;
    resize:none;
}

/* botões */

.buttons{
    margin-top:10px;
}

button{
    background:#e50914;
    border:none;
    color:white;
    padding:10px 15px;
    margin-right:10px;
    cursor:pointer;
    border-radius:5px;
}

/* palco */

#stage{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    padding:60px;
    overflow:auto;
    font-size:40px;
    line-height:1.6;
}

#closeStage{
    position:fixed;
    top:20px;
    right:20px;
    background:red;
}

</style>
</head>

<body>

<header>
General Tracks
</header>

<div id="editor">

<h3>Cole aqui a cifra ou letra</h3>

<textarea id="lyrics">

Tom: G

[G]Senhor eu preciso de Ti
[D]Mais do que ontem
[Em]Mais do que palavras
[C]Eu quero Te sentir

</textarea>

<div class="buttons">

<button onclick="openStage()">
Modo Palco
</button>

<button onclick="startScroll()">
Auto Scroll
</button>

<button onclick="stopScroll()">
Parar
</button>

</div>

</div>

<div id="stage">

<button id="closeStage" onclick="closeStage()">
Sair
</button>

<div id="stageText"></div>

</div>

<script>

let scrollInterval;

function openStage(){

let text = document.getElementById("lyrics").value;

document.getElementById("stageText").innerText = text;

document.getElementById("stage").style.display="block";

}

function closeStage(){

document.getElementById("stage").style.display="none";

stopScroll();

}

function startScroll(){

let stage = document.getElementById("stage");

scrollInterval = setInterval(()=>{

stage.scrollTop += 1;

},50);

}

function stopScroll(){

clearInterval(scrollInterval);

}

</script>

</body>
</html>
