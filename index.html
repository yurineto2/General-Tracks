<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>General Tracks v2</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
display:flex;
height:100vh;
}

#songs{
width:220px;
background:#111;
padding:10px;
overflow:auto;
}

#songs button{
width:100%;
margin-bottom:6px;
padding:8px;
background:#222;
color:white;
border:none;
cursor:pointer;
}

#main{
flex:1;
padding:20px;
}

.track{
display:flex;
align-items:center;
margin-bottom:8px;
gap:10px;
}

.transport{
margin-top:20px;
}

button{
padding:10px 16px;
margin-right:10px;
}

#stage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:40px;
}

</style>
</head>

<body>

<div id="songs">

<h3>Setlist</h3>

<button onclick="selectSong(0)">Música 1</button>
<button onclick="selectSong(1)">Música 2</button>

</div>

<div id="main">

<h1 id="songName">Nenhuma música</h1>

<div class="track">
Drums <input type="file" id="drums">
<input type="range" min="0" max="1" step="0.01" value="1" id="vol_drums">
</div>

<div class="track">
Bass <input type="file" id="bass">
<input type="range" min="0" max="1" step="0.01" value="1" id="vol_bass">
</div>

<div class="track">
Pads <input type="file" id="pads">
<input type="range" min="0" max="1" step="0.01" value="1" id="vol_pads">
</div>

<div class="track">
Click <input type="file" id="click">
<input type="range" min="0" max="1" step="0.01" value="1" id="vol_click">
</div>

<div class="transport">

<button onclick="play()">Play</button>
<button onclick="stop()">Stop</button>
<button onclick="nextSong()">Next</button>
<button onclick="stageMode()">Modo Palco</button>

</div>

</div>

<div id="stage">

<div id="stageSong">Música</div>

<button onclick="play()">PLAY</button>
<button onclick="nextSong()">NEXT</button>

<button onclick="closeStage()">SAIR</button>

</div>

<script>

let audioContext
let sources=[]
let currentSong=0

const songs=[
"Musica 1",
"Musica 2"
]

function selectSong(i){

currentSong=i
document.getElementById("songName").innerText=songs[i]
document.getElementById("stageSong").innerText=songs[i]

}

async function load(file){

const array=await file.arrayBuffer()
return await audioContext.decodeAudioData(array)

}

async function play(){

audioContext=new(window.AudioContext||window.webkitAudioContext)()

sources=[]

const ids=["drums","bass","pads","click"]

for(let id of ids){

const input=document.getElementById(id)

if(input.files.length===0)continue

const buffer=await load(input.files[0])

const source=audioContext.createBufferSource()
const gain=audioContext.createGain()

gain.gain.value=document.getElementById("vol_"+id).value

source.buffer=buffer
source.connect(gain)
gain.connect(audioContext.destination)

sources.push(source)

}

const start=audioContext.currentTime+0.1

sources.forEach(s=>s.start(start))

}

function stop(){

sources.forEach(s=>{
try{s.stop()}catch(e){}
})

sources=[]

}

function nextSong(){

currentSong++

if(currentSong>=songs.length)currentSong=0

selectSong(currentSong)

}

function stageMode(){

document.getElementById("stage").style.display="flex"

}

function closeStage(){

document.getElementById("stage").style.display="none"

}

selectSong(0)

</script>

</body>
</html>
